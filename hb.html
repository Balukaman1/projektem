<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Horváth Bálint</title>
  <meta name="theme-color" content="#060608"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red:       #c8000a;
      --red2:      #ff1a1a;
      --red-glow:  rgba(200,0,10,0.55);
      --red-dim:   rgba(200,0,10,0.18);
      --ink:       #060608;
      --card:      #0d0d0f;
      --lift:      #131317;
      --line:      rgba(255,255,255,0.07);
      --mute:      #444;
      --ghost:     #888;
      --snow:      #f2f2f4;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;min-height:100%;background:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}

    /* ── NOISE OVERLAY ── */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity:0.035;
    }

    /* ── CANVAS ── */
    #cv{position:fixed;inset:0;z-index:0;pointer-events:none}

    /* ── PAGE ── */
    .page{
      position:relative;z-index:1;
      min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;
      padding-bottom:72px;
    }

    /* ══════════════════════════════
       HERO SECTION
    ══════════════════════════════ */
    .hero{
      width:100%;max-width:500px;
      display:flex;flex-direction:column;align-items:center;
      padding:56px 24px 0;
      position:relative;
    }

    /* big red ambient behind avatar */
    .hero::before{
      content:'';
      position:absolute;top:20px;left:50%;transform:translateX(-50%);
      width:260px;height:260px;
      background:radial-gradient(circle, rgba(200,0,10,0.22) 0%, transparent 70%);
      border-radius:50%;
      pointer-events:none;
      animation:pulse 3s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.12)}}

    /* ── AVATAR ── */
    .av-wrap{
      position:relative;width:148px;height:148px;
      margin-bottom:32px;
      opacity:0;animation:riseIn .9s .1s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* outer dashed orbit */
    .av-wrap::before{
      content:'';position:absolute;inset:-14px;border-radius:50%;
      border:1px dashed rgba(200,0,10,0.4);
      animation:spin 18s linear infinite;
    }
    /* inner solid ring */
    .av-wrap::after{
      content:'';position:absolute;inset:-5px;border-radius:50%;
      background:conic-gradient(var(--red) 0deg,#3a0000 90deg,transparent 160deg,var(--red) 360deg);
      animation:spin 3.5s linear infinite;
    }

    .av-frame{
      position:absolute;inset:0;border-radius:50%;
      background:var(--lift);
      overflow:hidden;z-index:2;
      /* subtle inner shadow */
      box-shadow:inset 0 0 20px rgba(0,0,0,0.8);
    }
    .av-frame img{
      width:100%;height:100%;
      object-fit:cover;object-position:center top;
      filter:contrast(1.05) saturate(0.9);
    }
    /* scan line over photo */
    .av-frame::after{
      content:'';position:absolute;inset:0;border-radius:50%;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);
      pointer-events:none;z-index:3;
    }

    /* small orbit dot */
    .orbit-dot{
      position:absolute;inset:-14px;border-radius:50%;
      animation:spin 3.5s linear infinite;
      z-index:3;pointer-events:none;
    }
    .orbit-dot::before{
      content:'';position:absolute;
      top:50%;left:50%;
      width:7px;height:7px;border-radius:50%;
      background:var(--red2);
      box-shadow:0 0 8px var(--red2);
      transform:translate(-50%, -155px);
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── NAME ── */
    .name{
      font-family:'Archivo Black',sans-serif;
      font-size:clamp(38px,11vw,60px);
      color:var(--snow);
      letter-spacing:1px;
      text-align:center;
      line-height:1;
      opacity:0;animation:riseIn .7s .3s cubic-bezier(.22,1,.36,1) forwards;
    }
    .name em{color:var(--red);font-style:normal}

    /* ── STATUS BADGE ── */
    .badge{
      margin-top:14px;
      display:inline-flex;align-items:center;gap:8px;
      background:var(--red-dim);
      border:1px solid rgba(200,0,10,0.3);
      border-radius:2px;
      padding:5px 14px;
      opacity:0;animation:riseIn .6s .5s cubic-bezier(.22,1,.36,1) forwards;
    }
    .badge-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--red2);
      box-shadow:0 0 6px var(--red2);
      animation:blink 1.4s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .badge-text{
      font-family:'DM Mono',monospace;
      font-size:10px;letter-spacing:3px;
      color:var(--red2);text-transform:uppercase;
    }

    /* ── SAVE BTN ── */
    .save-wrap{
      margin-top:28px;
      opacity:0;animation:riseIn .6s .65s cubic-bezier(.22,1,.36,1) forwards;
    }
    .save-btn{
      display:inline-flex;align-items:center;gap:11px;
      background:var(--red);
      color:#fff;text-decoration:none;
      font-family:'DM Mono',monospace;font-size:12px;
      letter-spacing:2.5px;text-transform:uppercase;
      padding:13px 26px;border-radius:2px;
      position:relative;overflow:hidden;
      transition:background .25s,transform .15s,box-shadow .25s;
      box-shadow:0 0 28px var(--red-glow),0 0 60px rgba(200,0,10,0.2);
      -webkit-tap-highlight-color:transparent;
    }
    .save-btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.14) 50%,transparent 60%);
      transform:translateX(-100%);
      transition:transform .55s ease;
    }
    .save-btn:hover::before{transform:translateX(100%)}
    .save-btn:hover{background:var(--red2);transform:translateY(-2px);box-shadow:0 6px 32px var(--red-glow)}
    .save-btn:active{transform:translateY(0)}
    .save-btn svg{width:16px;height:16px;fill:#fff;flex-shrink:0}

    /* ══════════════════════════════
       SECTION LABEL
    ══════════════════════════════ */
    .sec{
      width:100%;max-width:460px;
      padding:0 20px;
      margin-top:38px;
      display:flex;align-items:center;gap:14px;
    }
    .sec-label{
      font-family:'DM Mono',monospace;font-size:9px;
      letter-spacing:3.5px;color:var(--mute);
      text-transform:uppercase;white-space:nowrap;
    }
    .sec-line{flex:1;height:1px;background:var(--line)}

    /* ══════════════════════════════
       CONTACT GRID
    ══════════════════════════════ */
    .grid3{
      width:100%;max-width:460px;
      padding:12px 20px 0;
      display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
    }
    .grid4{
      width:100%;max-width:460px;
      padding:10px 20px 0;
      display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
    }

    .crd{
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:9px;padding:20px 8px 16px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:3px;
      text-decoration:none;
      color:var(--ghost);
      font-family:'DM Mono',monospace;font-size:9px;
      letter-spacing:1.5px;text-transform:uppercase;
      position:relative;overflow:hidden;
      transition:background .2s,border-color .2s,transform .15s,color .2s;
      -webkit-tap-highlight-color:transparent;
    }
    /* bottom accent bar */
    .crd::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:var(--red);
      transform:scaleX(0);transform-origin:left;
      transition:transform .3s ease;
    }
    /* top-left corner mark */
    .crd::before{
      content:'';position:absolute;top:0;left:0;
      width:12px;height:12px;
      border-top:1px solid var(--red);
      border-left:1px solid var(--red);
      opacity:0;transition:opacity .2s;
    }
    .crd:hover,.crd:active{
      background:var(--lift);border-color:rgba(200,0,10,0.3);
      transform:translateY(-3px);color:var(--snow);
    }
    .crd:hover::after,.crd:active::after{transform:scaleX(1)}
    .crd:hover::before,.crd:active::before{opacity:1}
    .crd svg{width:30px;height:30px;fill:currentColor;transition:fill .2s}

    .crd-sm{padding:15px 6px 13px;gap:7px}
    .crd-sm svg{width:24px;height:24px}

    /* ══════════════════════════════
       BOTTOM NAV / SCROLL TOP
    ══════════════════════════════ */
    .up-btn{
      margin-top:44px;
      display:flex;flex-direction:column;align-items:center;gap:6px;
      text-decoration:none;
      color:var(--mute);
      font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
      transition:color .2s;
      -webkit-tap-highlight-color:transparent;
    }
    .up-btn svg{width:28px;height:28px;fill:var(--mute);transition:fill .2s,transform .25s}
    .up-btn:hover{color:var(--snow)}
    .up-btn:hover svg{fill:var(--red);transform:translateY(-3px)}

    /* ══════════════════════════════
       STAGGER ANIMATIONS
    ══════════════════════════════ */
    .sec,.grid3,.grid4,.up-btn{
      opacity:0;animation:riseIn .6s cubic-bezier(.22,1,.36,1) forwards;
    }
    .s1{animation-delay:.8s}
    .s2{animation-delay:.95s}
    .s3{animation-delay:1.1s}
    .s4{animation-delay:1.25s}
    .s5{animation-delay:1.38s}
    .s6{animation-delay:1.5s}

    @keyframes riseIn{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }

    /* ══════════════════════════════
       MODAL
    ══════════════════════════════ */
    .overlay{
      display:none;position:fixed;inset:0;z-index:999;
      background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
      align-items:center;justify-content:center;
    }
    .overlay.on{display:flex}
    .mbox{
      background:var(--card);
      border:1px solid rgba(200,0,10,0.35);
      border-radius:3px;padding:36px 28px 32px;
      max-width:290px;width:88%;text-align:center;
      position:relative;
      animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 0 60px rgba(200,0,10,0.2);
    }
    @keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    .mclose{
      position:absolute;top:12px;right:14px;
      background:none;border:none;
      color:var(--mute);font-size:22px;line-height:1;cursor:pointer;
      transition:color .2s,transform .2s;
    }
    .mclose:hover{color:var(--snow);transform:rotate(90deg)}
    .micon{font-size:34px;margin-bottom:12px}
    .mtitle{
      font-family:'Archivo Black',sans-serif;
      font-size:22px;letter-spacing:1px;color:var(--snow);margin-bottom:10px;
    }
    .mtext{
      font-family:'DM Mono',monospace;font-size:10px;
      line-height:1.9;color:var(--ghost);letter-spacing:.5px;
    }
    .mtext strong{color:var(--red2)}

    /* landscape */
    @media(orientation:landscape){
      .hero{padding-top:28px}
      .av-wrap{width:110px;height:110px;margin-bottom:20px}
      .av-wrap::before{inset:-10px}
      .av-wrap::after{inset:-4px}
      .name{font-size:44px}
    }
  </style>
</head>

<script>
/* ═══════════ PARTICLE CANVAS ═══════════ */
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H;

function rsz(){
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
}
rsz();
window.addEventListener('resize', rsz);

function r(a,b){ return Math.random()*(b-a)+a }

/* grid lines */
const LINES = [];
for(let i=0;i<6;i++){
  LINES.push({
    x: r(0, window.innerWidth),
    y: r(0, window.innerHeight),
    angle: r(-0.3, 0.3),
    speed: r(0.15, 0.4),
    len: r(80, 220),
    alpha: r(0.03, 0.09),
    col: Math.random()>.5 ? '#cc0000' : '#ffffff'
  });
}

/* particles */
class P {
  constructor(){ this.init() }
  init(){
    this.x = r(0,W); this.y = r(0,H);
    this.rad = r(.4,1.6);
    this.vx = r(-.2,.2); this.vy = r(-.4,-.08);
    this.life = 1; this.dec = r(.003,.007);
    this.col = Math.random()>.65 ? '#cc0000' : '#ffffff';
  }
  tick(){ this.x+=this.vx; this.y+=this.vy; this.life-=this.dec; if(this.life<=0||this.y<-5)this.init(); }
  draw(){
    cx.globalAlpha = this.life*.6;
    cx.fillStyle = this.col;
    cx.beginPath(); cx.arc(this.x,this.y,this.rad,0,Math.PI*2); cx.fill();
  }
}

const pts = Array.from({length:70}, ()=>new P());

function draw(){
  cx.clearRect(0,0,W,H);

  /* flowing lines */
  LINES.forEach(l=>{
    l.y += l.speed;
    l.x += Math.sin(l.y*.005)*0.4;
    if(l.y > H+l.len) l.y = -l.len;
    cx.globalAlpha = l.alpha;
    cx.strokeStyle = l.col;
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(l.x, l.y);
    cx.lineTo(l.x + Math.sin(l.angle)*l.len, l.y + l.len);
    cx.stroke();
  });

  /* particles */
  pts.forEach(p=>{ p.tick(); p.draw(); });
  cx.globalAlpha = 1;
  requestAnimationFrame(draw);
}
draw();

/* ═══════════ MODAL ═══════════ */
function onSave(e){
  setTimeout(()=>{ document.getElementById('mod').classList.add('on'); }, 350);
}
function modClose(){ document.getElementById('mod').classList.remove('on'); }
function modOut(e){ if(e.target===document.getElementById('mod')) modClose(); }

/* ═══════════ TOUCH FEEDBACK ═══════════ */
document.querySelectorAll('.crd').forEach(b=>{
  b.addEventListener('touchstart',()=>{ b.style.background='#1a1a1e'; b.style.borderColor='rgba(200,0,10,0.3)'; },{passive:true});
  b.addEventListener('touchend',()=>{ setTimeout(()=>{ b.style.background=''; b.style.borderColor=''; },300); },{passive:true});
});
</script>
